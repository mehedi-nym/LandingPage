  <style>
  /* ================= COUNTDOWN SECTION ================= */

.countdown-icons img:nth-child(5) { bottom: 15%; left: 20%; animation-delay: 2s; }
.countdown-icons img:nth-child(6) { bottom: 25%; right: 25%; animation-delay: 2.5s; }

/* Floating effect */

  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
@keyframes fadeIn {
  to { opacity: 1; }
}

  
  /* Entry directions */
  .float-left { animation: slideLeft 2s ease forwards, float 6s ease-in-out infinite; }
  .float-right { animation: slideRight 2s ease forwards, float 6s ease-in-out infinite; }
  
  /* Keyframes */
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  @keyframes slideLeft {
    from { transform: translateX(-120px) scale(0.8); opacity: 0; }
    to { transform: translateX(0) scale(1); opacity: 1; }
  }
  @keyframes slideRight {
    from { transform: translateX(120px) scale(0.8); opacity: 0; }
    to { transform: translateX(0) scale(1); opacity: 1; }
  }
  @keyframes float {

    50% { transform: translateY(-15px); }
  }

  <script>
  // ================= DYNAMIC COUNTDOWN =================
  function startCountdown(targetDate) {
    const timer = setInterval(() => {
      const now = new Date().getTime();
      const distance = targetDate - now;
  
      if (distance <= 0) {
        clearInterval(timer);
        document.getElementById("countdown-timer").innerHTML = "🎉 We Are Live!";
        return;
      }
  
      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);
  
      document.getElementById("days").textContent = days.toString().padStart(2, "0");
      document.getElementById("hours").textContent = hours.toString().padStart(2, "0");
      document.getElementById("minutes").textContent = minutes.toString().padStart(2, "0");
      document.getElementById("seconds").textContent = seconds.toString().padStart(2, "0");
    }, 1000);
  }
  
  // Example: Launch in 10 days
  const launchDate = new Date();
  launchDate.setDate(launchDate.getDate() + 10);
  startCountdown(launchDate.getTime());
  </script>
