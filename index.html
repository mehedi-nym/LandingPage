<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ryoko — Section 1 (Scroll-driven)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="header"></div>

  <!-- Scene 1 -->
  <div class="section video-section" id="scene-1">
    <div class="overlay">
      <h1 class="scene-title">Travel Reimagined</h1>
      <div class="typewriter">
        <p>Scroll down to reveal the Adventure.</p>
      </div>
    </div>
    <video id="vid-scene-1" muted playsinline preload="metadata" loop poster="img/vid1-poster.png">
      <source src="videos/vid1.mp4" type="video/mp4">
      Your browser does not support HTML5 video.
    </video>
    <div class="dark-layer"></div>
  </div>

  <!-- Scene 2 -->
<div class="section video-section" id="scene-2">
  <div class="overlay">
  <h1 class="scene-title-right">Design. Speed. Reliability.</h1>
  <p>One more scroll to the countdown</p>
  </div>
  <video id="vid-scene-2" muted playsinline preload="metadata" loop poster="img/vid2-poster.png">
  <source src="videos/vid2.mp4" type="video/mp4">
  Your browser does not support HTML5 video.
  </video>
  <div class="dark-layer"></div>
  </div>
  <!-- placeholders for next sections (kept minimal in this step) -->

   <div class="section" id="countdown-section" style="background:linear-gradient(180deg,#0b0b0d,#0b0b0d);">
     <section id="countdown"></section>
  </div> 
  

  <div class="section" id="scene-3" style="background:linear-gradient(180deg,#060607,#07070a);">
    <div class="overlay"><h1 style="opacity:.08;font-size:48px">Scene 3 (placeholder)</h1></div>
  </div>

  <div id="footer"></div>

  <div class="scroll-hint" id="scrollHint">Scroll to play</div>

  <!-- Scroll Indicator -->
<div class="scroll-indicator" id="scrollIndicator"></div>


  <!-- GSAP + plugins (CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>

<script>
  // Load countdown.html
  fetch("countdown.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("countdown").innerHTML = data;

      // ✅ Now run the countdown scripts AFTER content is loaded
      initCountdownAnimations();
    });

function initCountdown() {
  const countdownDate = new Date("2025-12-31T23:59:59").getTime();
  setInterval(() => {
    const now = new Date().getTime();
    const distance = countdownDate - now;
    if(distance < 0) return;

    document.getElementById("days").innerText = Math.floor(distance / (1000*60*60*24));
    document.getElementById("hours").innerText = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    document.getElementById("minutes").innerText = Math.floor((distance % (1000*60*60)) / (1000*60));
    document.getElementById("seconds").innerText = Math.floor((distance % (1000*60)) / 1000);
  }, 1000);

  gsap.registerPlugin(ScrollTrigger);

  gsap.utils.toArray(".countdown-icons img").forEach((icon, i) => {
    gsap.fromTo(icon,
      { opacity: 0, x: i % 2 === 0 ? -150 : 150, y: -50 + i*10, scale: 0.5 },
      {
        opacity: 1, x: 0, y: 0, scale: 1,
        duration: 1.2, delay: i*0.15, ease: "power3.out",
        scrollTrigger: {
          trigger: ".countdown-section",
          start: "top 90%", // trigger when section comes into view
        },
        onComplete: () => {
          gsap.to(icon, { y: "+=12", repeat: -1, yoyo: true, duration: 2.5, ease: "sine.inOut" });
        }
      }
    );
  });
}

// After fetching countdown.html
fetch("countdown.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("countdown").innerHTML = data;
    initCountdown(); // initialize GSAP & countdown after DOM is ready
  });
</script>


  <script>
    gsap.registerPlugin(ScrollTrigger, ScrollToPlugin);

    function safePlay(video){
      if(!video) return;
      if(video.muted === false) video.muted = true;
      const p = video.play();
      if(p && typeof p.catch === 'function') p.catch(e=>console.warn('play prevented',e));
    }

    const scene1 = document.getElementById('scene-1');
    const vid1 = document.getElementById('vid-scene-1');

    ScrollTrigger.create({
      trigger: scene1,
      start: 'top center',
      end: 'bottom center',
      onEnter: () => safePlay(vid1),
      onEnterBack: () => safePlay(vid1),
      onLeave: () => vid1.pause(),
      onLeaveBack: () => vid1.pause(),
    });

    gsap.from('.scene-title',{
      y: -80,
      opacity: 0,
      duration: 1.05,
      ease: 'power3.out',
      scrollTrigger: {
        trigger: scene1,
        start: 'top 80%',
        toggleActions: 'play none none reverse'
      }
    });

    gsap.from('#scene-1 .overlay p',{y:40,opacity:0,duration:.9,scrollTrigger:{trigger:scene1,start:'top 78%',toggleActions:'play none none reverse'}});

    // Scene 2 video and animation (title from right)
    const scene2 = document.getElementById('scene-2');
    const vid2 = document.getElementById('vid-scene-2');
    ScrollTrigger.create({trigger: scene2,start:'top center',end:'bottom center',onEnter:()=>safePlay(vid2),onEnterBack:()=>safePlay(vid2),onLeave:()=>vid2.pause(),onLeaveBack:()=>vid2.pause()});
    gsap.from('.scene-title-right',{x:200,opacity:0,duration:1.05,ease:'power3.out',scrollTrigger:{trigger:scene2,start:'top 80%',toggleActions:'play none none reverse'}});
    gsap.from('#scene-2 .overlay p',{y:40,opacity:0,duration:.9,scrollTrigger:{trigger:scene2,start:'top 78%',toggleActions:'play none none reverse'}});


    const dots = document.querySelectorAll('.scroll-nav .dot');
    const sections = document.querySelectorAll('.section');

    function setActiveDot(index){
      dots.forEach(d=>d.classList.remove('active'));
      if(dots[index]) dots[index].classList.add('active');
    }

    ScrollTrigger.create({
      trigger: scene1,
      start: 'top center',
      end: 'bottom center',
      onEnter: () => setActiveDot(0),
      onEnterBack: () => setActiveDot(0)
    });

    dots.forEach(dot=>{
      dot.addEventListener('click',()=>{
        const target = dot.dataset.target;
        gsap.to(window,{duration:1,scrollTo:{y:target,autoKill:true}});
      });
    });

    if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches){
      document.querySelectorAll('video').forEach(v=>v.pause());
      document.getElementById('scrollHint').textContent = 'Reduced motion — videos paused';
    }

    window.addEventListener('touchstart',()=>{ safePlay(vid1); },{once:true});

    async function loadPart(id,file){
      try{
        const r = await fetch(file);
        if(!r.ok) return;
        const html = await r.text();
        document.getElementById(id).innerHTML = html;
      }catch(e){ }
    }
    loadPart('header','header.html');
    loadPart('footer','footer.html');
  </script>
  <!-- section Indicator --> 
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const sections = document.querySelectorAll('.section');
      const indicator = document.getElementById('scrollIndicator');
    
      // Generate dots dynamically
      sections.forEach((sec, i) => {
        const dot = document.createElement('div');
        dot.classList.add('dot');
        if (i === 0) dot.classList.add('active'); // first dot active
        dot.addEventListener('click', () => {
          gsap.to(window, {
            duration: 1,
            scrollTo: sec,
            ease: "power2.inOut"
          });
        });
        indicator.appendChild(dot);
      });
    
      const dots = indicator.querySelectorAll('.dot');
    
      // Track active section using IntersectionObserver
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const index = [...sections].indexOf(entry.target);
            dots.forEach(d => d.classList.remove('active'));
            dots[index].classList.add('active');
          }
        });
      }, { threshold: 0.5 }); // 50% in view
    
      sections.forEach(sec => observer.observe(sec));
    });
    </script>
    
  
</body>
</html>
