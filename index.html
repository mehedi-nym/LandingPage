<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ryoko</title>
  <link rel="stylesheet" type="text/css" href="styles.css" />
</head>
<body>
    <div id="header"></div>
  <!-- Scene 1 -->
  <div class="section video-section" id="scene-1">
    <video playsinline preload="metadata" loop poster="img/vid1-poster.png">
      <source src="videos/vid1.mp4" type="video/mp4">
      <!-- Optional: add webm fallback <source src="videos/vid1.webm" type="video/webm"> -->
      Your browser does not support HTML5 video.
    </video>
    <!-- <div class="dark-layer"></div> --->
    <!--- <div class="overlay"> --->
      <h1></h1>
      <p></p>
    </div>
  </div>

  <!-- Scene 2 -->
  <div class="section video-section" id="scene-2">
    <video muted playsinline preload="metadata" loop poster="img/vid2-poster.png">
      <source src="videos/vid2.mp4" type="video/mp4">
      Your browser does not support HTML5 video.
    </video>
    <div class="dark-layer"></div>
    <div class="overlay">
      <h1>Design. Speed. Reliability.</h1>
      <p>One more scroll to the countdown</p>
    </div>
  </div>

  <!-- Placeholder: Countdown section (we'll implement the stopwatch in Step 2) -->
  <div class="section countdown" id="countdown-section">
    <div class="overlay">
      <h2>Coming Soon</h2>
      <div id="countdown" style="font-size:clamp(20px,6vw,48px); font-weight:700; margin-top:.6rem;">
        Countdown placeholder
      </div>
    </div>
  </div>

  <!-- Branding / Footer -->
  <div class="section branding" id="branding-section">
    <div class="overlay">
      <img src="img/Logo.png" alt="Brand logo" style="max-width:180px; display:block; margin:0 auto 1rem;">
      <p style="opacity:.95">Your brand tagline here — follow us on social</p>
      <footer>© <span id="year"></span> Your Company</footer>
    </div>
  </div>
 
  <div id="footer"></div>

  <div class="scroll-hint" id="scrollHint">
    <span>Scroll to play</span>
  </div>
  

  <!-- GSAP + ScrollTrigger (CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <script>
    // Set copyright year
    document.getElementById('year').textContent = new Date().getFullYear();

    // Register plugin
    gsap.registerPlugin(ScrollTrigger);

    // Play/pause each video when its section is centered in viewport
    document.querySelectorAll('.video-section').forEach(section => {
      const vid = section.querySelector('video');

      // Make sure autoplay policies are satisfied
      vid.muted = true;
      vid.playsInline = true;
      vid.preload = 'metadata';

      // Create ScrollTrigger
      ScrollTrigger.create({
        trigger: section,
        start: 'top center',
        end: 'bottom center',
        onEnter: () => safePlay(vid),
        onEnterBack: () => safePlay(vid),
        onLeave: () => vid.pause(),
        onLeaveBack: () => vid.pause(),
        // markers: true // enable for debugging
      });
    });

    // Safely call play() and catch promise rejection
    function safePlay(video) {
      const p = video.play();
      if (p !== undefined) p.catch(err => {
        // Autoplay blocked (rare when muted) — fallback handled below
        console.warn('Video play blocked:', err);
      });
    }

    // Respect prefers-reduced-motion: stop auto-play
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.querySelectorAll('video').forEach(v => { v.pause(); });
      document.getElementById('scrollHint').textContent = 'Reduced motion — videos paused';
    }

    // Helpful note: if videos don't autoplay (mobile/strict browsers),
    // user interaction (tap or first scroll) will usually allow playback.
    window.addEventListener('touchstart', () => {
      // try to un-block playback after first touch
      document.querySelectorAll('.video-section video').forEach(v => safePlay(v));
    }, {once:true});
  </script>
  <script>
    // Load header + footer dynamically
    async function loadPart(id, file) {
      const resp = await fetch(file);
      const html = await resp.text();
      document.getElementById(id).innerHTML = html;
    }
    loadPart("header", "header.html");
    loadPart("footer", "footer.html");
  </script>
  <script>
    const toggleBtn = document.querySelector('.menu-toggle');
    const nav = document.querySelector('.main-nav');
  
    toggleBtn.addEventListener('click', () => {
      nav.classList.toggle('active');
    });
  </script>
</body>
</html>
